<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">SI Inter Pack</title>
  <desc id="desc">SI monogram in ivory on a deep indigo circle</desc>
  <defs>
    <linearGradient id="mark" x1="72" y1="48" x2="438" y2="468" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7569C7"/>
      <stop offset="0.48" stop-color="#4B409A"/>
      <stop offset="1" stop-color="#31286F"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientTransform="translate(156 114) rotate(45) scale(300)">
      <stop stop-color="white" stop-opacity=".16"/>
      <stop offset="1" stop-color="white" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <circle cx="256" cy="256" r="248" fill="url(#mark)"/>
  <circle cx="256" cy="256" r="238" fill="url(#glow)" stroke="#AFA7E2" stroke-opacity=".42" stroke-width="3"/>
  <text x="54" y="374" fill="#FBFFF7" font-family="Georgia, 'Times New Roman', serif" font-size="348" font-weight="700" letter-spacing="-34">Si</text>
</svg>
