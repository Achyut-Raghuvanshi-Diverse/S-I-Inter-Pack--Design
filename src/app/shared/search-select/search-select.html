<div class="select-shell" [class.field-variant]="variant() === 'field'" [class.align-end]="align() === 'end'" [class.is-open]="open()" [class.is-disabled]="isDisabled()">
  @if (label()) { <div class="select-label">{{ label() }}</div> }
  <button class="select-trigger" type="button" role="combobox" aria-haspopup="listbox" [attr.aria-label]="ariaLabel()" [attr.aria-expanded]="open()" [attr.aria-controls]="listboxId" [attr.aria-activedescendant]="activeOptionId()" [disabled]="isDisabled()" (click)="toggle()" (keydown)="buttonKeydown($event)" (blur)="touch()"><span [class.placeholder]="!selected()">{{ selected()?.label ?? placeholder() }}</span><i><svg lucideChevronDown size="14"></svg></i></button>
  @if (open()) {
    <div class="select-popover" [style.top.px]="menuPosition().top" [style.bottom.px]="menuPosition().bottom" [style.left.px]="menuPosition().left" [style.width.px]="menuPosition().width">
      @if (searchable()) { <label class="select-search"><svg lucideSearch size="15"></svg><input type="search" autofocus aria-label="Search options" placeholder="Search options…" [attr.aria-controls]="listboxId" [attr.aria-activedescendant]="activeOptionId()" [value]="query()" (input)="updateQuery($event)" (keydown)="searchKeydown($event)" /></label> }
      <div class="option-list" role="listbox" [id]="listboxId" [attr.aria-label]="ariaLabel()" (keydown)="searchKeydown($event)">
        @for (option of filtered(); track option.value; let index = $index) { <button [id]="componentId + '-option-' + index" type="button" role="option" [class.active]="index === activeIndex()" [class.selected]="same(option.value, currentValue())" [attr.aria-selected]="same(option.value, currentValue())" (mouseenter)="activeIndex.set(index)" (click)="choose(option)"><span><strong>{{ option.label }}</strong>@if (option.description) { <small>{{ option.description }}</small> }</span>@if (same(option.value, currentValue())) { <b><svg lucideCheck size="14"></svg></b> }</button> }
        @empty { <p>No matching options</p> }
      </div>
    </div>
  }
</div>
